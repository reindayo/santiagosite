{% extends "layout/base.html" %}
{% block title %}Delete Gender{% endblock %}
{% block content %}

<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 text-center">

        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M19 7l-.867 12.142A2 2 0 0116.138 21
                         H7.862a2 2 0 01-1.995-1.858L5 7m5
                         4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4
                         a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
        </div>

        <h1 class="text-xl font-bold text-gray-800 mb-2">Delete Gender</h1>
        <p class="text-gray-500 text-sm mb-1">You are about to delete:</p>
        <p class="text-lg font-semibold text-gray-900 mb-6">{{ gender.name }}</p>
        <p class="text-xs text-red-500 mb-6">This action cannot be undone.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="flex justify-center gap-3">
                <button type="submit"
                    class="px-6 py-2 bg-red-600 text-white text-sm font-medium
                           rounded-lg hover:bg-red-700 transition-colors">
                    Yes, Delete
                </button>
                <a href="{% url 'GendersList' %}"
                   class="px-6 py-2 bg-gray-100 text-gray-700 text-sm font-medium
                          rounded-lg hover:bg-gray-200 transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
