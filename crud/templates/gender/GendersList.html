{% extends "layout/base.html" %}
{% block title %}Genders — SantiagoSite{% endblock %}
{% block content %}

<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Genders</h1>
    <a href="{% url 'AddGender' %}"
       class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white
              text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        Add Gender
    </a>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="w-full text-sm text-left">
        <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">#</th>
                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase">Name</th>
                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase text-right">
                    Actions
                </th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
            {% for gender in genders %}
            <tr class="hover:bg-gray-50 transition-colors">
                <td class="px-6 py-4 text-gray-500">{{ forloop.counter }}</td>
                <td class="px-6 py-4 font-medium text-gray-900">{{ gender.name }}</td>
                <td class="px-6 py-4 text-right space-x-3">
                    <a href="{% url 'EditGender' gender.pk %}"
                       class="text-blue-600 hover:text-blue-800 font-medium text-sm">Edit</a>
                    <a href="{% url 'DeleteGender' gender.pk %}"
                       class="text-red-500 hover:text-red-700 font-medium text-sm">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="px-6 py-10 text-center text-gray-400">
                    No genders added yet.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
